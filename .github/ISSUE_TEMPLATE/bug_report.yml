name: Bug report
description: Report a reproducible bug or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction so maintainers can verify the fix.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: The agent crashes when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Provide the smallest sequence of commands, config, or UI actions that reproduces the problem.
      placeholder: |
        1. Configure ...
        2. Run ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include exact error messages when available.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include the versions and runtime details that may affect reproduction.
      value: |
        - OS:
        - Node.js:
        - npm:
        - Teleton version:
        - Installation method: npm / Docker / source
        - LLM provider:
        - Telegram mode: user / bot
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste relevant logs, stack traces, screenshots, or CI links. Redact secrets before posting.
      render: shell
  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-submit checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: I removed or redacted API keys, tokens, private keys, and personal data.
          required: true
