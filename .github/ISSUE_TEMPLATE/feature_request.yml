name: Feature request
description: Propose a new capability or improvement
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an improvement. Please focus on the workflow or problem first, then the implementation idea.
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What workflow is blocked, painful, unsafe, or missing?
      placeholder: I want to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, API, CLI command, UI flow, or documentation change you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of Teleton is most affected?
      options:
        - Agent runtime
        - Telegram tools
        - TON tools
        - Memory and RAG
        - WebUI
        - Management API
        - Plugin SDK
        - Documentation
        - CI or release process
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative designs have you considered?
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: How should maintainers and users know this is done?
      placeholder: |
        - ...
        - ...
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add links, mockups, examples, or related issues.
