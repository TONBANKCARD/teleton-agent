<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="title desc">
  <title id="title">Teleton Agent WebUI Architecture</title>
  <desc id="desc">WebUI connects to the authenticated WebUI API, agent runtime, services, memory, tools, and external integrations.</desc>
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .box { fill: #151b22; stroke: #3a4654; stroke-width: 2; rx: 12; }
      .core { fill: #10243a; stroke: #2f8df7; }
      .service { fill: #10281d; stroke: #37b26c; }
      .external { fill: #2a1d12; stroke: #f0a340; }
      .text { fill: #f4f7fb; font: 18px system-ui, sans-serif; }
      .small { fill: #b8c0cc; font: 14px system-ui, sans-serif; }
      .line { stroke: #7c8794; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c8794" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="620" />
  <rect class="box core" x="60" y="70" width="240" height="130" />
  <text class="text" x="95" y="120">WebUI</text>
  <text class="small" x="95" y="150">React dashboard</text>
  <text class="small" x="95" y="174">Setup wizard</text>
  <rect class="box core" x="470" y="70" width="260" height="130" />
  <text class="text" x="510" y="120">Authenticated API</text>
  <text class="small" x="510" y="150">Hono routes</text>
  <text class="small" x="510" y="174">CSRF + audit middleware</text>
  <rect class="box core" x="880" y="70" width="250" height="130" />
  <text class="text" x="920" y="120">Agent Runtime</text>
  <text class="small" x="920" y="150">Plan, act, observe</text>
  <text class="small" x="920" y="174">Tool execution loop</text>
  <rect class="box service" x="110" y="330" width="220" height="120" />
  <text class="text" x="145" y="380">Memory</text>
  <text class="small" x="145" y="410">SQLite, graph, vectors</text>
  <rect class="box service" x="390" y="330" width="220" height="120" />
  <text class="text" x="425" y="380">Services</text>
  <text class="small" x="425" y="410">Analytics, audit, cache</text>
  <rect class="box service" x="670" y="330" width="220" height="120" />
  <text class="text" x="705" y="380">Tools</text>
  <text class="small" x="705" y="410">Telegram, TON, web, MCP</text>
  <rect class="box external" x="950" y="330" width="200" height="120" />
  <text class="text" x="982" y="380">External APIs</text>
  <text class="small" x="982" y="410">LLM, Telegram, TON</text>
  <line class="line" x1="300" y1="135" x2="470" y2="135" />
  <line class="line" x1="730" y1="135" x2="880" y2="135" />
  <line class="line" x1="600" y1="200" x2="500" y2="330" />
  <line class="line" x1="620" y1="200" x2="220" y2="330" />
  <line class="line" x1="730" y1="200" x2="780" y2="330" />
  <line class="line" x1="890" y1="200" x2="1050" y2="330" />
  <line class="line" x1="890" y1="390" x2="950" y2="390" />
</svg>
