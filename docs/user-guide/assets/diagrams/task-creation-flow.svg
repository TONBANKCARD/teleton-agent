<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Autonomous Task Creation Flow</title>
  <desc id="desc">A user writes a natural-language goal, AI parses it into fields, policy checks run, and the task starts with checkpoints and logs.</desc>
  <defs>
    <style>
      .bg { fill: #0b0f14; }
      .step { fill: #151b22; stroke: #3a4654; stroke-width: 2; rx: 14; }
      .gate { fill: #2a1d12; stroke: #f0a340; }
      .text { fill: #f4f7fb; font: 18px system-ui, sans-serif; }
      .small { fill: #b8c0cc; font: 14px system-ui, sans-serif; }
      .line { stroke: #7c8794; stroke-width: 2; marker-end: url(#arrow); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7c8794" />
    </marker>
  </defs>
  <rect class="bg" width="1200" height="520" />
  <rect class="step" x="60" y="190" width="190" height="120" />
  <text class="text" x="92" y="238">Describe Goal</text>
  <text class="small" x="92" y="268">Natural language</text>
  <rect class="step" x="310" y="190" width="190" height="120" />
  <text class="text" x="342" y="238">Parse With AI</text>
  <text class="small" x="342" y="268">Goal, criteria, limits</text>
  <rect class="step" x="560" y="190" width="190" height="120" />
  <text class="text" x="592" y="238">Review Fields</text>
  <text class="small" x="592" y="268">Edit strategy and tools</text>
  <rect class="step gate" x="810" y="190" width="190" height="120" />
  <text class="text" x="842" y="238">Policy Check</text>
  <text class="small" x="842" y="268">Budget, scope, risk</text>
  <rect class="step" x="1030" y="190" width="130" height="120" />
  <text class="text" x="1053" y="238">Run</text>
  <text class="small" x="1053" y="268">Logs + checkpoints</text>
  <line class="line" x1="250" y1="250" x2="310" y2="250" />
  <line class="line" x1="500" y1="250" x2="560" y2="250" />
  <line class="line" x1="750" y1="250" x2="810" y2="250" />
  <line class="line" x1="1000" y1="250" x2="1030" y2="250" />
</svg>
